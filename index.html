<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthropic Claude Progress</title>

    <!-- Google Fonts: Poppins (sans) for headings, Lora (serif) for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Anthropic Claude container -->
    <div class="anthropic-container">
        <!-- Anthropic Logo -->
        <div class="anthropic-logo">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="56" height="56" rx="14" fill="#d97757"/>
                <path d="M28 14C20.268 14 14 20.268 14 28C14 35.732 20.268 42 28 42C32.637 42 36.735 39.716 39.193 36.276L35.656 33.739C33.906 35.489 31.098 36.5 28 36.5C23.029 36.5 19 32.471 19 28C19 23.529 23.029 19.5 28 19.5C31.098 19.5 33.906 20.511 35.656 22.261L39.193 19.724C36.735 16.284 32.637 14 28 14Z" fill="white"/>
            </svg>
        </div>

        <!-- Progress beam with Anthropic branding -->
        <div class="anthropic-beam" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="beam-container">
                <h2 class="beam-title">Claude is thinking</h2>
                <div class="beam-track">
                    <div class="beam-fill"></div>
                </div>
                <div class="beam-footer">
                    <span class="beam-status">Processing your request</span>
                    <span class="beam-percentage">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
