<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Progress Beam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top-right progress indicator -->
    <div class="progress-indicator" id="progressIndicator">
        <div class="indicator-content">
            <span class="progress-percentage">45%</span>
            <span class="estimated-time">~30s</span>
        </div>
        <div class="progress-beam-small">
            <div class="beam-fill-small" style="width: 45%"></div>
        </div>
    </div>

    <!-- Hover preview panel (slides from right) -->
    <div class="preview-panel" id="previewPanel">
        <div class="preview-header">
            <span class="preview-title">Claude is processing</span>
            <span class="preview-status">45% complete</span>
        </div>
        <div class="preview-body">
            <div class="preview-message">
                <p class="typing-text">Analyzing your request and generating a comprehensive response...</p>
            </div>
            <div class="progress-bar-preview">
                <div class="progress-track-preview">
                    <div class="progress-fill-preview" style="width: 45%"></div>
                </div>
                <span class="time-remaining">Estimated: 30s remaining</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
