<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Progress Beam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Claude-style progress beam -->
    <div class="claude-beam">
        <div class="beam-container">
            <div class="beam-track">
                <div class="beam-progress"></div>
            </div>
            <div class="beam-details">
                <span class="beam-status">Processing</span>
                <span class="beam-percentage">0%</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
