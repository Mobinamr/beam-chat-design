<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Progress Beam</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body class="light-mode">
    <!-- Mode Toggle Button -->
    <button class="mode-toggle" onclick="toggleMode()">
        <span class="toggle-icon">◐</span>
    </button>

    <!-- Progress Beam Component -->
    <div class="progress-beam">
        <div class="beam-info">
            <span class="beam-text">Thinking</span>
            <span class="beam-percentage">45%</span>
        </div>
        <div class="beam-track">
            <div class="beam-fill" style="width: 45%"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
